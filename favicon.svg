<svg viewBox="0 -15 100 135" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e63946"/>
            <stop offset="100%" style="stop-color:#ff6b6b"/>
        </linearGradient>
    </defs>
    <!-- Unlocked shackle (open) -->
    <path d="M30 50 L30 30 Q30 10 50 10 Q70 10 70 30 L70 35" fill="none" stroke="url(#lockGrad)" stroke-width="8" stroke-linecap="round" transform="rotate(-20, 70, 35)"/>
    <!-- Lock body -->
    <rect x="20" y="50" width="60" height="45" rx="8" fill="url(#lockGrad)"/>
    <!-- Keyhole -->
    <circle cx="50" cy="68" r="7" fill="#fff"/>
    <rect x="47" y="68" width="6" height="12" rx="2" fill="#fff"/>
</svg>
